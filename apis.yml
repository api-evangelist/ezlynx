  description: >-
    Consume EZLynx's event-driven layer - webhook notifications delivered in XML
    or JSON when platform data changes, such as new clients or policy updates -
    to trigger downstream automation. Delivery is one-way HTTP webhook callouts,
    not a public WebSocket. Event shapes modeled from EZLynx's public product
    material; subscription is partner and enterprise-gated.
