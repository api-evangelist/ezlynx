- aid: ezlynx:ezlynx-rating-engine-api
  name: EZLynx Rating Engine API
  tags:
  - Rating
  - Quotes
  - Quoting Automation
  - Data Bridge
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.ezlynx.com/products/ezlynx-api-solutions/
  properties:
  - url: https://www.ezlynx.com/products/ezlynx-api-solutions/
    type: Documentation
  - url: https://documenter.getpostman.com/view/17108315/UVXjHahb
    type: APIReference
  description: >-
    Submit applicant and risk data to the EZLynx Rating Engine for high-volume
    automated comparative quoting and retrieve quote results. Surfaces the
    backend behind Quoting Automation Services (QAS), which lets a partner build
    its own quoting UI while EZLynx runs the rating, and EZLynx Data Bridge for
    rapid applicant and risk data entry. Endpoints modeled; access is partner
    and enterprise-gated.
