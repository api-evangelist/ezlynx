name: EZLynx
kind: company
description: >-
  EZLynx is an insurance agency platform combining real-time comparative rating,
  an agency management system (AMS), and CRM for independent property and
  casualty (P&C) insurance agencies. Part of Applied Systems since 2021, EZLynx
  offers enterprise API solutions that let agencies push and pull data, create
  and update applicants, contacts, prospects, and opportunities, create policy
  headers, retrieve policy and quote-result data, and drive high-volume
  automated quoting through the EZLynx Rating Engine and Quoting Automation
  Services (QAS). An event-driven layer emits webhooks in XML or JSON for
  platform changes. API access is partner and enterprise-gated (contact sales,
  OAuth 2.0), not a public self-serve developer program, so the API surface
  below is honestly modeled from EZLynx's public product and integration
  material rather than a published open reference.
